---
- name: Ensure KV engine exists, update admin policy, and write a secret
  hosts: localhost
  connection: local
  gather_facts: no
  collections:
    - community.hashi_vault

  vars:
    ansible_python_interpreter: "{{ (lookup('env', 'VIRTUAL_ENV') | default('.venv')) + '/bin/python' }}"
    vault_addr: "http://127.0.0.1:8200"
    auth_mount_path: "userpass"
    kv_version: "2"

  vars_prompt:
    - name: "admin_username"
      prompt: "Enter admin username"
      private: no
      default: "admin"

    - name: "admin_password"
      prompt: "Enter admin password"
      private: yes

    - name: "mount_path"
      prompt: "Enter KV mount path (example: persona, app, config)"
      private: no

    - name: "secret_key"
      prompt: "Enter key name (example: api_key)"
      private: no

    - name: "secret_value"
      prompt: "Enter value for the key"
      private: yes

  tasks:
    # 🔑 Login admin via userpass
    - name: Login admin via userpass to get token
      uri:
        url: "{{ vault_addr }}/v1/auth/{{ auth_mount_path }}/login/{{ admin_username }}"
        method: POST
        headers:
          Content-Type: "application/json"
        body: "{{ {'password': admin_password} | to_json }}"
        return_content: yes
        status_code: 200
      register: login_result
      failed_when: login_result.status != 200

    - name: Save admin token (vault_token)
      set_fact:
        vault_token: "{{ login_result.json.auth.client_token }}"

    - name: Confirm login success
      debug:
        msg: "Login successful — received admin token (length {{ vault_token | length }})."

    # 🔎 Check mounts
    - name: List currently enabled mounts
      uri:
        url: "{{ vault_addr }}/v1/sys/mounts"
        method: GET
        headers:
          "X-Vault-Token": "{{ vault_token }}"
        return_content: yes
        status_code: 200
      register: mounts_result

    - name: Determine if requested mount exists
      set_fact:
        mount_exists: "{{ (mount_path + '/') in (mounts_result.json | default({})) }}"

    - name: Debug - mount exists?
      debug:
        msg: "KV engine '{{ mount_path }}/' exists: {{ mount_exists }}"

    # 🛠 Enable KV v2 engine if missing
    - name: Enable KV v2 secrets engine if not present
      uri:
        url: "{{ vault_addr }}/v1/sys/mounts/{{ mount_path }}"
        method: POST
        headers:
          "X-Vault-Token": "{{ vault_token }}"
          Content-Type: "application/json"
        body: "{{ {'type': 'kv', 'options': {'version': kv_version}} | to_json }}"
        status_code: [200, 204]
        return_content: yes
      when: not mount_exists

    # 🔎 Get current admin policy
    - name: Get current admin policy
      uri:
        url: "{{ vault_addr }}/v1/sys/policies/acl/admin"
        method: GET
        headers:
          "X-Vault-Token": "{{ vault_token }}"
        return_content: yes
        status_code: 200
      register: admin_policy_result

    - name: Save current admin policy text
      set_fact:
        current_policy: "{{ admin_policy_result.json.policy | default('') }}"

    # 🆕 Build stanza for new KV engine
    - name: Build new KV engine policy stanza
      set_fact:
        new_stanza: |
          path "{{ mount_path }}/*" {
            capabilities = ["create", "read", "update", "delete", "list"]
          }

    - name: Merge new stanza into existing policy if missing
      set_fact:
        merged_policy: |
          {{ current_policy }}
          {{ new_stanza }}
      when: new_stanza not in current_policy

    # ✅ Update admin policy with merged rules
    - name: Update admin policy with merged rules
      uri:
        url: "{{ vault_addr }}/v1/sys/policies/acl/admin"
        method: PUT
        headers:
          "X-Vault-Token": "{{ vault_token }}"
          Content-Type: "application/json"
        body: >
          {{
            { "policy": merged_policy | default(current_policy) }
            | to_json
          }}
        status_code: [200, 204]

    - name: Confirm policy update
      debug:
        msg: "Admin policy updated with permissions for '{{ mount_path }}/*'."

    # 📝 Write secret into KV engine
    - name: Write secret to {{ mount_path }}/data/root
      uri:
        url: "{{ vault_addr }}/v1/{{ mount_path }}/data/root"
        method: POST
        headers:
          "X-Vault-Token": "{{ vault_token }}"
          Content-Type: "application/json"
        body: "{{ {'data': { secret_key: secret_value }} | to_json }}"
        status_code: [200, 204]
        return_content: yes
      register: write_result

    - name: Confirm secret write
      debug:
        msg: "Secret written at {{ mount_path }}/root with key '{{ secret_key }}'."
