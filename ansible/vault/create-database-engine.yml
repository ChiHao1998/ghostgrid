---
- name: Create or connect Vault PostgreSQL database engine
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    ansible_python_interpreter: "{{ (lookup('env', 'VIRTUAL_ENV') | default('.venv')) + '/bin/python' }}"
    vault_addr: "http://127.0.0.1:8200"
    auth_mount_path: "userpass"

  vars_prompt:
    - name: vault_admin_username
      prompt: "Vault admin username"
      default: "admin"
      private: no

    - name: vault_admin_password
      prompt: "Vault admin password"
      private: yes

    - name: db_host
      prompt: "Postgres host"
      default: "127.0.0.1"
      private: no

    - name: db_port
      prompt: "Postgres port"
      default: 5432
      private: no

    - name: db_admin_user
      prompt: "Postgres admin username"
      default: "postgres"
      private: no

    - name: db_admin_password
      prompt: "Postgres admin password"
      private: yes

    - name: database_name
      prompt: "Database name"
      private: no

    - name: engine_name
      prompt: "Vault database engine name"
      private: no

  tasks:
    # --------------------------------------------------
    # Login
    # --------------------------------------------------
    - name: Login to Vault
      uri:
        url: "{{ vault_addr }}/v1/auth/{{ auth_mount_path }}/login/{{ vault_admin_username }}"
        method: POST
        headers:
          Content-Type: "application/json"
        body: "{{ {'password': vault_admin_password} | to_json }}"
        return_content: yes
        status_code: 200
      register: vault_login

    - set_fact:
        vault_token: "{{ vault_login.json.auth.client_token }}"

    # --------------------------------------------------
    # Enable database engine (ignore if already exists)
    # --------------------------------------------------
    - name: Enable database engine
      uri:
        url: "{{ vault_addr }}/v1/sys/mounts/{{ engine_name }}"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_token }}"
          Content-Type: "application/json"
        body: "{{ {'type': 'database'} | to_json }}"
        status_code: [200, 204, 400]
      register: enable_engine_result
      failed_when: enable_engine_result.status not in [200, 204, 400]
      ignore_errors: yes

    # --------------------------------------------------
    # Configure PostgreSQL connection
    # --------------------------------------------------
    - name: Configure PostgreSQL connection
      uri:
        url: "{{ vault_addr }}/v1/{{ engine_name }}/config/{{ database_name }}"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_token }}"
          Content-Type: "application/json"
        body: "{{ {
          'plugin_name': 'postgresql-database-plugin',
          'allowed_roles': '*',
          'connection_url': 'postgresql://' ~ db_admin_user ~ ':' ~ db_admin_password ~ '@' ~ db_host ~ ':' ~ db_port|string ~ '/' ~ database_name ~ '?sslmode=disable'
        } | to_json }}"
        status_code: [200, 204]

    - name: Done
      debug:
        msg: "Vault PostgreSQL engine '{{ engine_name }}' is ready and secured."
